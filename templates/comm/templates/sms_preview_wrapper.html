<div style="background: #f1f5f9; padding: 20px; font-family: 'Inter', sans-serif;">
    <div style="max-width: 320px; margin: 0 auto; background: #ffffff; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); overflow: hidden;">
        <div style="background: #ffffff; padding: 12px 16px; border-bottom: 1px solid #f1f5f9; display: flex; align-items: center; gap: 10px;">
            <div style="width: 32px; height: 32px; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                <i class="bi bi-person-fill" style="color: #64748b;"></i>
            </div>
            <div style="font-weight: 600; font-size: 13px; color: #1e293b;">iRoad Notification</div>
        </div>
        <div style="padding: 16px;">
            <div style="background: #e9ecef; padding: 12px 16px; border-radius: 18px; border-bottom-left-radius: 4px; font-size: 14px; line-height: 1.5; color: #334155; {% if lang == 'ar' %}direction: rtl; text-align: right;{% endif %}">
                {{ body_text|linebreaksbr }}
            </div>
            <div style="font-size: 10px; color: #94a3b8; margin-top: 8px; {% if lang == 'ar' %}text-align: right;{% else %}text-align: left;{% endif %}">
                Just now • SMS
            </div>
        </div>
    </div>
</div>
