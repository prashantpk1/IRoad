{% extends "base.html" %}
{% block title %}Create Support Ticket{% endblock %}
{% block content %}
<div class="container py-3">
  <h1 class="h4 mb-3">Create Support Ticket</h1>
  <div class="card">
    <div class="card-body">
      <form method="post" novalidate>
        {% csrf_token %}
        <div class="row g-3">
          {% for field in form %}
            <div class="col-md-6">
              <label class="form-label" for="{{ field.id_for_label }}">{{ field.label }}</label>
              {{ field }}
              {% if field.errors %}
                <div class="text-danger small mt-1">{{ field.errors|join:", " }}</div>
              {% endif %}
            </div>
          {% endfor %}
        </div>
        <div class="mt-3 d-flex gap-2">
          <a href="{% url 'ticket_list' %}" class="btn btn-outline-secondary">Cancel</a>
          <button type="submit" class="btn btn-primary">Save</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
