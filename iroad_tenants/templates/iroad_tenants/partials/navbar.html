      <!-- Top Header -->
      <header class="top-header">
        <div class="header-left">
          <button
            class="header-toggle-btn"
            id="sidebarCollapseBtn"
            title="Toggle Sidebar"
          >
            <i class="bi bi-list"></i>
          </button>
          <div class="header-search">
            <i class="bi bi-search"></i>
            <input
              type="text"
              placeholder="Search shipments, clients, addresses..."
            />
          </div>
        </div>
        <div class="header-datetime">
          <span class="header-date" id="headerDate"
            >Tuesday, 28 January 2026</span
          >
          <span class="header-time" id="headerTime">3:52 PM</span>
        </div>
        <div class="header-right">
          <button class="header-icon-btn" title="Switch Language">
            <i class="bi bi-translate"></i>
          </button>
          <button class="header-icon-btn" title="Notifications">
            <i class="bi bi-bell"></i>
            <span class="badge">3</span>
          </button>
          <div class="header-divider"></div>
          <div class="header-user-wrapper">
            <div class="header-user" id="headerUserToggle">
              <div class="header-user-avatar">
                <img
                  src="https://ui-avatars.com/api/?name={{ avatar_name|default:'Tenant+User' }}&background=5051f9&color=fff&size=40"
                  alt="User"
                />
              </div>
              <div class="header-user-info">
                <span class="header-user-name">{{ display_name|default:"Tenant User" }}</span>
                <span class="header-user-role">{{ display_role|default:"Tenant Admin" }}</span>
              </div>
              <i class="bi bi-chevron-down header-user-chevron"></i>
            </div>

            <!-- Header User Dropdown -->
            <div class="header-user-dropdown" id="headerUserDropdown">
              <div class="header-dropdown-profile">
                <div class="header-dropdown-avatar">
                  <img
                    src="https://ui-avatars.com/api/?name={{ avatar_name|default:'Tenant+User' }}&background=e8e8e8&color=888&size=80"
                    alt="User"
                  />
                </div>
                <div class="header-dropdown-name">{{ display_name|default:"Tenant User" }}</div>
                <div class="header-dropdown-email">{{ display_email|default:"tenant@example.com" }}</div>
              </div>
              <div class="header-dropdown-divider"></div>
              <ul class="header-dropdown-menu">
                <li>
                  <a href="{% url 'iroad_tenants:tenant_my_account' %}" class="header-dropdown-item">
                    <i class="bi bi-person"></i>
                    <span>My Account</span>
                  </a>
                </li>
                <li>
                  <a href="{% url 'iroad_tenants:tenant_logout' %}" class="header-dropdown-item">
                    <i class="bi bi-box-arrow-right"></i>
                    <span>Sign out</span>
                  </a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </header>
