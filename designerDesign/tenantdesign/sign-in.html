<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="iRoad Admin Dashboard - Sign In" />
    <title>Sign In | iRoad Admin</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="Style/style.css" />
    <link rel="stylesheet" href="Style/responsive.css" />
  </head>

  <body class="auth-body">
    <div class="auth-container">
      <!-- Left Panel - Decorative -->
      <div class="auth-left">
        <div class="auth-left-content">
          <h2 class="auth-tagline">
            Streamline Your Logistics <br />Operations Effortlessly.
          </h2>
          <p class="auth-description">
            Efficiently manage your fleet, cargo, accounts & deliveries with our
            powerful admin dashboard.
          </p>
        </div>
        <div class="auth-left-overlay"></div>
      </div>

      <!-- Right Panel - Form -->
      <div class="auth-right">
        <div class="auth-form-container">
          <div class="auth-form-header">
            <div class="auth-brand">
              <span class="auth-logo">i<span>Road</span></span>
            </div>
            <h1 class="auth-title">Sign In</h1>
            <p class="auth-subtitle">Please enter your details to sign in</p>
          </div>

          <form class="auth-form" action="index.html" method="get">
            <!-- Email Field -->
            <div class="auth-field">
              <label for="email" class="auth-label">Email Address</label>
              <div class="auth-input-wrapper">
                <i class="bi bi-envelope"></i>
                <input
                  type="email"
                  id="email"
                  class="auth-input"
                  placeholder="Enter your email"
                  required
                />
              </div>
            </div>

            <!-- Password Field -->
            <div class="auth-field">
              <label for="password" class="auth-label">Password</label>
              <div class="auth-input-wrapper">
                <i class="bi bi-lock"></i>
                <input
                  type="password"
                  id="password"
                  class="auth-input"
                  placeholder="Enter your password"
                  required
                />
                <button
                  type="button"
                  class="auth-toggle-password"
                  onclick="togglePassword()"
                >
                  <i class="bi bi-eye" id="toggleIcon"></i>
                </button>
              </div>
            </div>

            <!-- Forgot Password Link -->
            <div class="auth-options">
              <a href="reset-password.html" class="auth-link"
                >Forgot Password?</a
              >
            </div>

            <!-- Submit Button -->
            <button type="submit" class="auth-btn auth-btn-primary">
              <i class="bi bi-box-arrow-in-right"></i>
              Sign In
            </button>
          </form>

          <div class="auth-footer">
            <p>&copy; 2026 iRoad. All rights reserved.</p>
          </div>
        </div>
      </div>
    </div>

    <script>
      function togglePassword() {
        const passwordInput = document.getElementById("password");
        const toggleIcon = document.getElementById("toggleIcon");

        if (passwordInput.type === "password") {
          passwordInput.type = "text";
          toggleIcon.classList.remove("bi-eye");
          toggleIcon.classList.add("bi-eye-slash");
        } else {
          passwordInput.type = "password";
          toggleIcon.classList.remove("bi-eye-slash");
          toggleIcon.classList.add("bi-eye");
        }
      }
    </script>
  </body>
</html>
