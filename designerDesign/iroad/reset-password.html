<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="iRoad Admin Dashboard - Reset Password" />
    <title>Reset Password | iRoad Admin</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <!-- Custom CSS -->
    <link rel="stylesheet" href="Style/style.css" />
    <link rel="stylesheet" href="Style/responsive.css" />
  </head>

  <body class="auth-body">
    <div class="auth-container">
      <!-- Left Panel - Decorative -->
      <div class="auth-left">
        <div class="auth-left-content">
          <h2 class="auth-tagline">Secure Password <br />Recovery Process.</h2>
          <p class="auth-description">
            We'll help you reset your password and get back to managing your
            operations.
          </p>
        </div>
        <div class="auth-left-overlay"></div>
      </div>

      <!-- Right Panel - Form -->
      <div class="auth-right">
        <!-- Back Button Top Right -->
      
        <div class="auth-form-container">
          <div class="auth-form-header">
            <div class="auth-brand">
              <span class="auth-logo">i<span>Road</span></span>
            </div>
            <h1 class="auth-title">Reset Password</h1>
            <p class="auth-subtitle">
              Enter your registered email address and we'll send you a
              verification code.
            </p>
          </div>

          <form class="auth-form" action="otp-verification.html" method="get">
            <!-- Email Field -->
            <div class="auth-field">
              <label for="email" class="auth-label">Email Address</label>
              <div class="auth-input-wrapper">
                <i class="bi bi-envelope"></i>
                <input
                  type="email"
                  id="email"
                  class="auth-input"
                  placeholder="Enter your registered email"
                  required
                />
              </div>
            </div>

            <!-- Submit Button -->
            <button type="submit" class="auth-btn auth-btn-primary">
              <i class="bi bi-arrow-right"></i>
              Next
            </button>
          </form>

          <div class="auth-footer">
            <p>&copy; 2026 iRoad. All rights reserved.</p>
          </div>
        </div>
      </div>
    </div>
  </body>
</html>
